baseURL: "https://analectastoa.com/"
languageCode: "en-us"
title: "Analecta Stoa"
theme: "PaperMod"

pagination:
  pagerSize: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: "production"
  title: "Analecta Stoa"
  description: "Reading summaries, excerpts, and curated details from classical literature — Tacitus, Josephus, Thucydides, and beyond."
  author: "Your Name"
  defaultTheme: "auto"
  disableThemeToggle: false
  ShowShareButtons: false
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false

  homeInfoParams:
    Title: "Analecta Stoa"
    Content: >
      Welcome. This is a curated companion to the great works of antiquity. Through a historiographical lens, we offer the summaries, primary excerpts, and scholarly annotations needed to navigate the chronicles of the ancient world. By examining how these foundational stories were first recorded, we gain a clearer mirror for understanding the complexities of our present day.
  socialIcons:
    - name: "github"
      url: "https://github.com/eduardo-aleman/analectastoa"

taxonomies:
  author: "authors"
  category: "categories"
  tag: "tags"
  series: "series"

menu:
  main:
    - identifier: "works"
      name: "Works"
      url: "/categories/"
      weight: 10
    - identifier: "authors"
      name: "Authors"
      url: "/authors/"
      weight: 20
    - identifier: "series"
      name: "Series"
      url: "/series/"
      weight: 30
    - identifier: "search"
      name: "Search"
      url: "/search/"
      weight: 40
    - identifier: "about"
      name: "About"
      url: "/about/"
      weight: 50

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
