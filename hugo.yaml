baseURL: "https://analectastoa.com/"
languageCode: "en-us"
title: "Analecta Stoa"
theme: "PaperMod"

pagination:
  pagerSize: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: "production"
  title: "Analecta Stoa"
  description: "Reading summaries, excerpts, and curated details from classical literature — Tacitus, Josephus, Thucydides, and beyond."
  author: "Eduardo Alemán"
  defaultTheme: "auto"
  disableThemeToggle: false
  ShowShareButtons: false
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false
  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    safari_pinned_tab: "/safari-pinned-tab.svg"

  homeInfoParams:
    Title: "Analecta Stoa"
    Content: >
      Welcome. This is my own personal curated companion to the great works of antiquity. Through a historiographical lens, this sites offer summaries, primary excerpts, and annotations needed to navigate the chronicles of the ancient world. 
      By examining how these foundational stories were first recorded, we gain a clearer mirror for understanding the complexities of our present day.
  socialIcons:

taxonomies:
  author: "authors"
  category: "categories"
  tag: "tags"
  series: "series"

menu:
  main:
    - identifier: "works"
      name: "Works"
      url: "/categories/"
      weight: 10
    - identifier: "authors"
      name: "Authors"
      url: "/authors/"
      weight: 20
    - identifier: "series"
      name: "Series"
      url: "/series/"
      weight: 30
    - identifier: "search"
      name: "Search"
      url: "/search/"
      weight: 40
    - identifier: "about"
      name: "About"
      url: "/about/"
      weight: 50

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
